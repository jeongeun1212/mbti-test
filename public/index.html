<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>유통/서비스IT팀 리더 MBTI 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF1EE;
    --bg-alt:#E2E8E4;
    --surface:#FFFFFF;
    --ink:#182420;
    --muted:#5B6B65;
    --line:rgba(24,36,32,0.16);
    --line-strong:rgba(24,36,32,0.32);
    --accent:#F5B700;
    --accent-ink:#3D2E00;
    --route:#1F5673;
    --danger:#B4432F;
    --nt:#6C5CE7;
    --nf:#2FA36B;
    --sj:#2E6F9E;
    --sp:#E2932E;
    /* per-letter palette, used only in the dichotomy donut charts */
    --e-color:#2E8B87;
    --i-color:#C1553E;
    --s-color:#D6A522;
    --n-color:#5B4E8C;
    --t-color:#2F6690;
    --f-color:#B85C82;
    --j-color:#3E8858;
    --p-color:#C97830;
    --radius:3px;
    --radius-card:16px;
    --radius-control:9px;
    --shadow-card:0 1px 2px rgba(24,36,32,0.05), 0 10px 28px rgba(24,36,32,0.07);
    --font-display:'Pretendard Variable','Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    --font-mono:'IBM Plex Mono', ui-monospace, 'SFMono-Regular', monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-display);
    font-size:15px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; }
  button{ font-family:inherit; cursor:pointer; }
  h1,h2,h3,p{ margin:0; }

  .barcode{
    height:9px; width:100%;
    background:repeating-linear-gradient(90deg,
      var(--ink) 0 2px, transparent 2px 5px,
      var(--ink) 5px 6px, transparent 6px 12px,
      var(--ink) 12px 15px, transparent 15px 22px,
      var(--ink) 22px 23px, transparent 23px 30px);
    opacity:0.9;
  }
  .barcode-mini{
    height:16px; width:96px; display:inline-block;
    background:repeating-linear-gradient(90deg,
      var(--ink) 0 2px, transparent 2px 4px,
      var(--ink) 4px 5px, transparent 5px 9px,
      var(--ink) 9px 11px, transparent 11px 15px);
    opacity:0.75;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 28px;
    background:var(--surface);
    border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:20;
  }
  .wordmark{
    font-family:var(--font-mono); font-weight:600; font-size:13px;
    letter-spacing:0.06em; text-transform:uppercase; color:var(--route);
    text-decoration:none; background:none; border:none; padding:0;
  }
  .tabs{ display:flex; gap:6px; }
  .tab{
    font-family:var(--font-mono); font-size:13px; padding:8px 12px;
    color:var(--muted); text-decoration:none;
    border-bottom:2px solid transparent;
  }
  .tab.active{ color:var(--ink); border-bottom-color:var(--accent); font-weight:600; }
  .tab:focus-visible, button:focus-visible, input:focus-visible, a:focus-visible{
    outline:2px solid var(--route); outline-offset:2px;
  }

  .container{ max-width:920px; margin:0 auto; padding:32px 20px 80px; }

  @keyframes riseIn{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:translateY(0);} }
  .container > *{ animation:riseIn .35s ease both; }
  @media (prefers-reduced-motion:reduce){ .container > *{ animation:none !important; } }
  .test-step{ animation:none !important; }

  .eyebrow{
    font-family:var(--font-mono); font-size:12px; letter-spacing:0.08em;
    color:var(--muted); text-transform:uppercase;
  }
  .mono-label{ font-family:var(--font-mono); font-size:12px; color:var(--muted); letter-spacing:0.02em; }

  /* ---------- home: hero panel ---------- */
  .hero{
    position:relative; overflow:hidden;
    background:linear-gradient(135deg, #FFFFFF 0%, #E4ECE8 100%);
    border:1px solid var(--line);
    border-radius:var(--radius-card);
    box-shadow:var(--shadow-card);
    padding:44px 40px;
    margin-bottom:20px;
  }
  .hero-pattern{
    position:absolute; inset:0; width:100%; height:100%;
    opacity:0.16; pointer-events:none;
  }
  .hero-grid{
    position:relative; z-index:1;
    display:grid; grid-template-columns:1.15fr 0.85fr; gap:36px; align-items:center;
  }
  .hero-eyebrow{
    font-family:var(--font-mono); font-size:12px; letter-spacing:0.1em;
    color:var(--route); text-transform:uppercase;
  }
  .hero-title{
    font-size:32px; font-weight:800; color:var(--ink); margin:14px 0 14px;
    letter-spacing:-0.01em; line-height:1.3;
  }
  .hero-sub{ color:var(--muted); max-width:42ch; font-size:14.5px; }

  .ticket{
    position:relative;
    background:var(--surface);
    border:1px dashed var(--line-strong);
    border-radius:var(--radius-card);
    box-shadow:var(--shadow-card);
    padding:24px;
    display:flex; flex-direction:column; gap:12px;
  }
  .ticket::before, .ticket::after{
    content:""; position:absolute; width:16px; height:16px; background:var(--bg);
    border-radius:50%; top:50%; transform:translateY(-50%);
  }
  .ticket::before{ left:-9px; }
  .ticket::after{ right:-9px; }
  .hero-ticket{ box-shadow:0 16px 36px rgba(24,36,32,0.12); }
  .hero-ticket::before, .hero-ticket::after{ background:#E4ECE8; }
  .hero-note{ font-size:12.5px; color:var(--muted); }

  #nickname-input, #admin-password{
    font-family:var(--font-display); font-size:15px;
    padding:12px 14px; border:1px solid var(--line-strong); border-radius:var(--radius-control);
    background:var(--bg); color:var(--ink); width:100%;
  }
  .btn-primary{
    font-family:var(--font-mono); font-weight:600; font-size:13px; letter-spacing:0.02em;
    background:var(--accent); color:var(--accent-ink); border:none;
    padding:13px 16px; border-radius:var(--radius-control);
  }
  .btn-primary:hover{ filter:brightness(0.96); }
  .btn-primary:disabled{ opacity:0.35; cursor:not-allowed; }
  .btn-primary.small{ padding:9px 14px; font-size:12px; }
  .btn-outline{
    font-family:var(--font-mono); font-size:13px; font-weight:600;
    background:transparent; color:var(--route); border:1px solid var(--route);
    padding:11px 16px; border-radius:var(--radius-control);
  }
  .btn-outline:disabled{ opacity:0.35; cursor:not-allowed; }
  .btn-outline.small{ padding:7px 12px; font-size:12px; }
  .btn-danger{
    font-family:var(--font-mono); font-size:12px; font-weight:600;
    background:transparent; color:var(--danger); border:1px solid var(--danger);
    padding:6px 10px; border-radius:var(--radius-control);
  }
  .btn-danger:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn-invert{
    font-family:var(--font-mono); font-weight:700; font-size:13px;
    background:var(--route); color:#fff; border:none;
    padding:13px 18px; border-radius:var(--radius-control);
    align-self:flex-start; margin-top:4px;
  }
  .btn-invert:hover{ filter:brightness(1.08); }

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-card);
    box-shadow:var(--shadow-card);
    padding:26px; margin-bottom:22px;
  }
  .card h2{ font-size:16px; font-weight:700; margin-bottom:8px; }

  .followup-cta{
    background:linear-gradient(135deg, #FFF7E0 0%, #FDEDC2 100%);
    border:1px solid rgba(61,46,0,0.08);
    color:var(--ink); border-radius:var(--radius-card);
    box-shadow:var(--shadow-card); padding:30px 32px; margin-bottom:22px;
    display:flex; flex-direction:column; gap:6px;
  }
  .followup-eyebrow{
    font-family:var(--font-mono); font-size:12px; letter-spacing:0.08em;
    color:var(--accent-ink); text-transform:uppercase; opacity:0.75;
  }
  .followup-cta h2{ color:var(--ink); font-size:19px; font-weight:700; margin:6px 0 4px; }
  .followup-cta p{ color:var(--muted); font-size:14px; max-width:52ch; margin-bottom:6px; }

  /* ---------- test wizard ---------- */
  .test-head{ margin-bottom:16px; }
  .test-head h1{ font-size:21px; font-weight:700; }

  .overall-bar{ height:6px; background:var(--bg-alt); border-radius:4px; overflow:hidden; margin-bottom:14px; }
  .overall-fill{ height:100%; background:var(--route); transition:width .3s ease; }
  @media (prefers-reduced-motion:reduce){ .overall-fill{ transition:none; } }

  .segments{ display:flex; gap:6px; margin-bottom:10px; }
  .segment{ flex:1; height:4px; background:var(--bg-alt); border-radius:3px; overflow:hidden; }
  .segment-fill{ height:100%; background:var(--muted); }
  .segment.current .segment-fill{ background:var(--accent); }

  .progress-meta{ display:flex; justify-content:space-between; margin-bottom:22px; }

  .wizard-question{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-card);
    box-shadow:var(--shadow-card);
    padding:32px 28px; margin-bottom:20px; min-height:180px;
  }
  .q-text-big{ font-size:19px; font-weight:600; line-height:1.5; margin-bottom:22px; }
  .likert-vertical{ display:flex; flex-direction:column; gap:8px; }
  .likert-vbtn{
    font-size:14.5px; padding:13px 16px; border:1px solid var(--line-strong);
    background:var(--bg); color:var(--ink); border-radius:var(--radius-control); text-align:left;
    transition:background-color .15s, border-color .15s;
  }
  .likert-vbtn.selected{ background:var(--route); border-color:var(--route); color:#fff; font-weight:600; }

  .wizard-nav{ display:flex; justify-content:space-between; gap:10px; }

  /* ---------- gauges ---------- */
  .gauges{ display:flex; flex-direction:column; gap:16px; }
  .gauge-label{ font-size:13px; font-weight:600; margin-bottom:6px; }
  .gauge-bar{ height:10px; border-radius:6px; background:var(--bg-alt); overflow:hidden; }
  .gauge-fill{ height:100%; background:var(--route); }
  .gauge-ends{
    display:flex; justify-content:space-between; margin-top:4px;
    font-family:var(--font-mono); font-size:12px; color:var(--muted);
  }

  /* ---------- result / detail ---------- */
  .result-ticket{ padding:26px; }
  .ticket-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .style-question{ font-size:13px; color:var(--muted); margin-bottom:6px; }
  .style-hero-link{ text-decoration:none; display:inline-block; }
  .style-hero{
    font-size:34px; font-weight:800; letter-spacing:-0.01em; margin-bottom:12px;
    color:var(--group-color, var(--route));
  }
  .style-hero-link:hover .style-hero{ text-decoration:underline; }
  .result-chips{ display:flex; align-items:center; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
  .code-chip{
    font-family:var(--font-mono); font-size:13px; font-weight:700; color:var(--ink);
    border:1px solid var(--line-strong); padding:4px 10px; border-radius:20px;
    text-decoration:none;
  }
  a.code-chip:hover{ border-color:var(--route); color:var(--route); }
  .group-chip{
    font-family:var(--font-mono); font-size:11px; font-weight:700; color:#fff;
    background:var(--group-color, var(--route)); padding:4px 10px; border-radius:20px;
  }
  .nickname-line{ font-size:14px; color:var(--muted); margin-bottom:4px; }
  .desc{ font-size:14.5px; color:var(--muted); max-width:56ch; margin-bottom:22px; }
  .ticket-foot{ border-top:1px dashed var(--line-strong); padding-top:14px; }
  .actions{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }

  /* ---------- MBTI type detail page ---------- */
  .style-page{
    display:grid; grid-template-columns:300px 1fr;
    border-radius:var(--radius-card); overflow:hidden;
    box-shadow:var(--shadow-card); margin-bottom:20px;
  }
  .style-side{
    padding:44px 28px; display:flex; flex-direction:column; align-items:center;
    text-align:center; color:#fff;
  }
  .type-icon-badge{
    width:112px; height:112px; border-radius:50%;
    background:radial-gradient(circle at 34% 30%, rgba(255,255,255,0.4), transparent 60%), var(--badge-bg);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 12px 26px rgba(0,0,0,0.22), inset 0 0 0 1px rgba(255,255,255,0.18);
    margin-bottom:22px;
  }
  .style-side-label{
    font-family:var(--font-mono); font-size:11.5px; letter-spacing:0.1em;
    text-transform:uppercase; opacity:0.85; margin-bottom:6px;
  }
  .style-side-code{ font-family:var(--font-mono); font-size:32px; font-weight:800; letter-spacing:0.02em; }

  .style-main{ background:var(--surface); padding:38px 36px; }
  .style-tagline2{ font-size:14px; color:var(--muted); margin-bottom:6px; }
  .style-alias-heading2{ font-size:25px; font-weight:800; line-height:1.3; margin-bottom:12px; }
  .style-desc2{ font-size:14.5px; color:var(--ink); line-height:1.75; margin-bottom:24px; }

  .style-sections2{ border-top:1px solid var(--line); padding-top:20px; margin-bottom:22px; }
  .style-sections2 h3{ font-size:14px; font-weight:700; margin-bottom:14px; }
  .style-block2{ margin-bottom:12px; font-size:14px; line-height:1.75; color:var(--ink); }
  .style-block2 .label2{
    font-weight:700; color:var(--route); margin-right:6px;
  }
  .style-block2 p{ display:inline; }
  .tip-box{
    background:var(--bg-alt); border-left:3px solid var(--accent);
    padding:12px 16px; border-radius:6px; font-size:13.5px; color:var(--ink);
    line-height:1.7; margin-top:16px;
  }
  .tip-box strong{ color:var(--accent-ink); }

  .scenario-card{ border-top:1px solid var(--line); padding-top:20px; }
  .scenario-card h3{ font-size:14px; font-weight:700; margin-bottom:12px; }
  .scenario-item{
    display:flex; gap:12px; padding:12px 0; border-bottom:1px dashed var(--line);
    font-size:14px; color:var(--ink); line-height:1.65;
  }
  .scenario-item:last-child{ border-bottom:none; }
  .scenario-num{ font-family:var(--font-mono); font-weight:700; color:var(--route); flex:none; }
  .scenario-item p{ margin:0; }

  /* ---------- dashboard ---------- */
  .dash-head{ margin-bottom:20px; }
  .dash-head h1{ font-size:22px; font-weight:700; margin-bottom:10px; }
  .dash-stat{ display:flex; align-items:center; justify-content:space-between; }
  .dash-section-label{
    font-size:16px; font-weight:700; margin:6px 0 14px; padding-left:2px;
  }
  .donut-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:22px;
  }
  .donut-card{ margin-bottom:0; text-align:center; }
  .donut-card-head{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; text-align:left;
  }
  .donut-title{ font-size:14.5px; font-weight:700; }
  .donut-total{ font-family:var(--font-mono); font-size:12px; color:var(--muted); }
  .donut-body{ display:flex; justify-content:center; margin-bottom:14px; }
  .donut-legend{ display:flex; justify-content:center; gap:18px; flex-wrap:wrap; }
  .donut-legend-grid{
    display:grid; grid-template-columns:repeat(4, auto); justify-content:center; gap:8px 20px;
  }
  .legend-item{
    display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--muted);
    font-family:var(--font-mono);
  }
  .legend-swatch{ width:10px; height:10px; border-radius:3px; flex:none; display:inline-block; }
  .hint{ font-size:13px; color:var(--muted); margin-bottom:12px; }

  .member-table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  .member-table th{
    text-align:left; font-family:var(--font-mono); font-size:11.5px; color:var(--muted);
    text-transform:uppercase; letter-spacing:0.04em; padding:8px 10px; border-bottom:1px solid var(--line-strong);
  }
  .member-table td{ padding:10px; border-bottom:1px solid var(--line); }
  .member-table .empty{ color:var(--muted); text-align:center; padding:22px 0; }
  .row-link{ text-decoration:underline; text-decoration-color:var(--line-strong); font-weight:600; }
  .mono-cell{ font-family:var(--font-mono); font-size:12.5px; color:var(--muted); }
  .badge{
    font-family:var(--font-mono); font-size:11.5px; font-weight:700; color:#fff;
    background:var(--badge-color, var(--route)); padding:3px 9px; border-radius:3px;
    text-decoration:none; display:inline-block;
  }
  a.badge:hover{ filter:brightness(1.1); }
  .admin-toolbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .note.warn{ color:var(--danger); font-size:13px; margin-top:8px; }
  .loading{ color:var(--muted); font-family:var(--font-mono); font-size:13px; padding:40px 0; text-align:center; }

  .admin-gate{ max-width:360px; margin:40px auto 0; text-align:left; }
  .admin-gate h1{ font-size:19px; font-weight:700; margin-bottom:8px; }
  .admin-gate .note{ color:var(--muted); font-size:13.5px; margin-bottom:14px; }
  .admin-gate .btn-primary{ width:100%; margin-top:10px; }

  #fallback-banner{
    background:#FFF3CD; color:#5C4400; font-size:13px; text-align:center;
    padding:9px 16px; border-bottom:1px solid rgba(92,68,0,0.2);
  }

  #toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(10px);
    background:var(--ink); color:#fff; font-size:13px; padding:11px 18px; border-radius:var(--radius);
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
    font-family:var(--font-display); z-index:50;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:680px){
    .container{ padding:20px 14px 70px; }
    .topbar{ padding:14px 16px; }
    .hero{ padding:28px 22px; }
    .hero-grid{ grid-template-columns:1fr; gap:22px; }
    .hero-title{ font-size:26px; }
    .followup-cta{ padding:24px 22px; }
    .donut-grid{ grid-template-columns:1fr; }
    .donut-legend-grid{ grid-template-columns:repeat(2, auto); }
    .wizard-question{ padding:24px 18px; }
    .style-hero{ font-size:27px; }
    .style-page{ grid-template-columns:1fr; }
    .style-side{ padding:28px 20px; }
    .style-main{ padding:26px 22px; }
  }
</style>
</head>
<body>
  <div class="barcode"></div>
  <header class="topbar">
    <a href="#/home" class="wordmark" id="wordmark">유통/서비스IT팀 · 리더 MBTI</a>
    <nav class="tabs">
      <a href="#/test" class="tab" data-path="test">테스트</a>
      <a href="#/dashboard" class="tab" data-path="dashboard">대시보드</a>
      <a href="#/admin" class="tab" data-path="admin">관리자</a>
    </nav>
  </header>
  <div id="fallback-banner" style="display:none;"></div>
  <main id="app" class="container"></main>
  <div id="toast"></div>

<script>
(function(){
  "use strict";

  /* ============ config ============ */
  var ADMIN_PASSWORD = "1q2w3e"; // NOTE: client-side gate only, not real security — visible in page/repo source.

  /* ============ storage backend ============
     Three possible backends, chosen automatically at startup:
     1. "claude"  — Claude's built-in artifact storage (window.storage).
                    Used when this page is opened inside a Claude.ai artifact.
     2. "http"    — this app's own /api/members endpoint, backed by a real
                    Neon Postgres database. Used when deployed on Vercel
                    (or any host that serves that API alongside this file).
     3. "memory"  — in-memory only, used as a last-resort fallback (e.g. the
                    file opened directly, or hosted somewhere with no API).
                    Results only last for the current tab and are not shared.
     detectBackend() runs once at startup; see the bottom of this file. */
  var backendMode = 'memory';
  var memoryStore = {}; // used only in 'memory' mode

  function apiUrl(path){
    return window.location.origin + path;
  }

  async function detectBackend(){
    if(typeof window.storage !== 'undefined') return 'claude';
    try{
      var res = await fetch(apiUrl('/api/members'), { method:'GET' });
      if(res.ok) return 'http';
    }catch(e){ /* no API available at this origin */ }
    return 'memory';
  }

  /* ============ data ============ */
  var LIKERT_LABELS = ['전혀 아님','아님','보통','그럼','매우 그럼'];

  var CATEGORIES = [
    { key:'EI', label:'에너지 방향', left:'E', right:'I' },
    { key:'SN', label:'정보 인식',   left:'S', right:'N' },
    { key:'TF', label:'판단 기준',   left:'T', right:'F' },
    { key:'JP', label:'생활 방식',   left:'J', right:'P' }
  ];

  function groupOf(code){
    return code[1]==='N' ? (code[2]==='T'?'NT':'NF') : (code[3]==='J'?'SJ':'SP');
  }

  /* ============ symbolic type icons (hand-drawn SVG, no external images) ============ */
  function starPoints(cx, cy, spikes, outerR, innerR){
    var points = [];
    var step = Math.PI / spikes;
    var rot = -Math.PI / 2;
    for(var i=0; i<spikes; i++){
      points.push((cx + Math.cos(rot)*outerR).toFixed(1) + ',' + (cy + Math.sin(rot)*outerR).toFixed(1));
      rot += step;
      points.push((cx + Math.cos(rot)*innerR).toFixed(1) + ',' + (cy + Math.sin(rot)*innerR).toFixed(1));
      rot += step;
    }
    return points.join(' ');
  }
  function hexPoints(cx, cy, r){
    var points = [];
    for(var i=0; i<6; i++){
      var a = Math.PI/180 * (60*i - 30);
      points.push((cx + r*Math.cos(a)).toFixed(1) + ',' + (cy + r*Math.sin(a)).toFixed(1));
    }
    return points.join(' ');
  }

  /* ============ storage helpers (shared team data) ============ */
  function memberKey(name){ return 'member:' + name; }

  async function getMember(name){
    try{
      if(backendMode==='claude'){
        var res = await window.storage.get(memberKey(name), true);
        return res ? JSON.parse(res.value) : null;
      }
      if(backendMode==='http'){
        var list = await listMembers();
        var found = list.find(function(m){ return m.nickname===name; });
        return found || null;
      }
      return memoryStore[name] || null;
    }catch(e){ return null; }
  }

  async function setMember(name, data){
    try{
      if(backendMode==='claude'){
        var res = await window.storage.set(memberKey(name), JSON.stringify(data), true);
        return !!res;
      }
      if(backendMode==='http'){
        var r = await fetch(apiUrl('/api/members'), {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify(data)
        });
        return r.ok;
      }
      memoryStore[name] = data;
      return true;
    }catch(e){ console.error(e); return false; }
  }

  async function deleteMember(name){
    try{
      if(backendMode==='claude'){
        await window.storage.delete(memberKey(name), true);
        return true;
      }
      if(backendMode==='http'){
        var r = await fetch(apiUrl('/api/members?nickname=' + encodeURIComponent(name)), { method:'DELETE' });
        return r.ok;
      }
      delete memoryStore[name];
      return true;
    }catch(e){ console.error(e); return false; }
  }

  async function listMembers(){
    try{
      if(backendMode==='claude'){
        var res = await window.storage.list('member:', true);
        if(!res || !res.keys) return [];
        var out = [];
        for(var i=0;i<res.keys.length;i++){
          try{
            var item = await window.storage.get(res.keys[i], true);
            if(item) out.push(JSON.parse(item.value));
          }catch(e){}
        }
        return out;
      }
      if(backendMode==='http'){
        var r = await fetch(apiUrl('/api/members'), { method:'GET' });
        if(!r.ok) return [];
        return await r.json();
      }
      return Object.keys(memoryStore).map(function(k){ return memoryStore[k]; });
    }catch(e){ return []; }
  }

  function escapeHtml(str){

    });
  }
  function pad2(n){ return String(n).padStart(2,'0'); }
  function formatDate(iso){
    var d = new Date(iso);
    return d.getFullYear() + '.' + pad2(d.getMonth()+1) + '.' + pad2(d.getDate());

  var toastTimer = null;

  /* ============ scoring ============ */
  function computeResult(answers){
    var letters = {}, pct = {};
    CATEGORIES.forEach(function(cat){
      var qs = QUESTIONS.filter(function(q){ return q.cat===cat.key; });
      var sumLeft = 0;
      qs.forEach(function(q){
        var v = answers[q.id];
        sumLeft += (q.pole===cat.left) ? v : (6-v);
      });
      var avg = sumLeft / qs.length;
      var leftPct = Math.round(((avg-1)/4)*100);
      leftPct = Math.max(0, Math.min(100, leftPct));
      var letter = avg>=3 ? cat.left : cat.right;
      letters[cat.key] = letter;
      pct[cat.key] = { left:cat.left, right:cat.right, leftPct:leftPct, rightPct:100-leftPct };
    });
    var code = CATEGORIES.map(function(c){ return letters[c.key]; }).join('');
    return { code:code, pct:pct };
  }

  function gaugeHtml(label, pctObj){
    return '' +
      '<div class="gauge">' +
        '<div class="gauge-label">' + label + '</div>' +
        '<div class="gauge-bar"><div class="gauge-fill" style="width:' + pctObj.leftPct + '%"></div></div>' +
        '<div class="gauge-ends"><span>' + pctObj.left + ' ' + pctObj.leftPct + '%</span><span>' + pctObj.right + ' ' + pctObj.rightPct + '%</span></div>' +
      '</div>';
  }

  /* ---------- donut charts (dashboard distribution section) ---------- */
  var LETTER_COLOR = { E:'var(--e-color)', I:'var(--i-color)', S:'var(--s-color)', N:'var(--n-color)',
                        T:'var(--t-color)', F:'var(--f-color)', J:'var(--j-color)', P:'var(--p-color)' };
  var LETTER_LABEL_KR = { E:'외향 E', I:'내향 I', S:'감각 S', N:'직관 N',
                           T:'사고 T', F:'감정 F', J:'판단 J', P:'인식 P' };

  // Two-tone ring: a left/right split (e.g. E vs I) drawn via stroke-dasharray.
  function donutTwoTone(leftColor, rightColor, leftPct, size, strokeWidth){
    var r = (size - strokeWidth) / 2;
    var c = 2 * Math.PI * r;
    var leftLen = c * (Math.max(0, Math.min(100, leftPct)) / 100);
    var cx = size / 2, cy = size / 2;
    return '<svg viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '" role="img" aria-hidden="true">' +
      '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + rightColor + '" stroke-width="' + strokeWidth + '" />' +
      '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + leftColor + '" stroke-width="' + strokeWidth + '" ' +
        'stroke-dasharray="' + leftLen + ' ' + c + '" transform="rotate(-90 ' + cx + ' ' + cy + ')" />' +
    '</svg>';
  }

  // Multi-segment ring (16-type distribution): segments = [{color, value}, ...]
  function donutMultiSegment(segments, size, strokeWidth){
    var r = (size - strokeWidth) / 2;
    var c = 2 * Math.PI * r;
    var cx = size / 2, cy = size / 2;
    var total = segments.reduce(function(s, seg){ return s + seg.value; }, 0);
    var offsetAcc = 0;
    var circles = segments.map(function(seg){
      var len = total > 0 ? c * (seg.value / total) : 0;
      var circle = '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + seg.color + '" stroke-width="' + strokeWidth + '" ' +
        'stroke-dasharray="' + len + ' ' + (c - len) + '" stroke-dashoffset="' + (-offsetAcc) + '" transform="rotate(-90 ' + cx + ' ' + cy + ')" />';
      offsetAcc += len;
      return circle;
    }).join('');
    var emptyRing = total === 0
      ? '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--line-strong)" stroke-width="' + strokeWidth + '" />'
      : '';
    return '<svg viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '" role="img" aria-hidden="true">' + emptyRing + circles + '</svg>';
  }

  function dichotomyDonutCardHtml(cat, leftSum, rightSum){
    var sumTotal = leftSum + rightSum;
    var leftPct = sumTotal > 0 ? Math.round((leftSum / sumTotal) * 100) : 50;
    var svg = donutTwoTone(LETTER_COLOR[cat.left], LETTER_COLOR[cat.right], leftPct, 128, 20);
    return '' +
      '<div class="card donut-card">' +
        '<div class="donut-card-head">' +
          '<span class="donut-title">' + cat.label + ' 누적 점수</span>' +
          '<span class="donut-total">누적 점수 ' + sumTotal + '</span>' +
        '</div>' +
        '<div class="donut-body">' + svg + '</div>' +
        '<div class="donut-legend">' +
          '<span class="legend-item"><span class="legend-swatch" style="background:' + LETTER_COLOR[cat.left] + '"></span>' + LETTER_LABEL_KR[cat.left] + '</span>' +
          '<span class="legend-item"><span class="legend-swatch" style="background:' + LETTER_COLOR[cat.right] + '"></span>' + LETTER_LABEL_KR[cat.right] + '</span>' +
        '</div>' +
      '</div>';
  }

  function typeDistributionCardHtml(typeCounts, total){
    var segments = Object.keys(TYPE_INFO).map(function(t){
      return { code:t, color:GROUP_META[groupOf(t)].color, value: typeCounts[t] };
    });
    var svg = donutMultiSegment(segments, 172, 26);
    var legendHtml = segments.map(function(seg){
      return '<span class="legend-item"><span class="legend-swatch" style="background:' + seg.color + '"></span>' + seg.code + '</span>';
    }).join('');
    return '' +
      '<div class="card">' +
        '<div class="donut-card-head">' +
          '<span class="donut-title">16유형 분포</span>' +
          '<span class="donut-total">총 ' + total + '명</span>' +
        '</div>' +
        '<div class="donut-body">' + svg + '</div>' +
        '<div class="donut-legend donut-legend-grid">' + legendHtml + '</div>' +
      '</div>';
  }

  /* ============ router ============ */
  function parseHash(){
    var h = location.hash.replace(/^#\/?/, '');
    var parts = h.split('?');
    var path = parts[0] || 'home';
    var params = new URLSearchParams(parts[1] || '');
    return { path:path, params:params };
  }
  function go(path, query){
    var qs = query ? '?' + new URLSearchParams(query).toString() : '';
    location.hash = '#/' + path + qs;
  }
  function updateTabs(path){
    document.querySelectorAll('.tab').forEach(function(t){
      t.classList.toggle('active', t.dataset.path===path);
    });
  }

  async function route(){
    clearAutoAdvance();
    var parsed = parseHash();
    updateTabs(parsed.path);
    if(parsed.path==='test') renderTestStep(parsed.params.get('name') || '');
    else if(parsed.path==='detail') await renderDetail(parsed.params.get('name') || '');
    else if(parsed.path==='style') renderStyleDetail(parsed.params.get('code') || '');
    else if(parsed.path==='dashboard') await renderDashboard();
    else if(parsed.path==='admin') renderAdmin();

  /* ============ test wizard (one question per step) ============ */
  var testState = { name:'', index:0, answers:{} };

  function renderTestStep(name){
    if(!name){ go('home'); return; }
    if(testState.name !== name){ testState = { name:name, index:0, answers:{} }; }

    var total = QUESTIONS.length;
    var idx = Math.max(0, Math.min(testState.index, total-1));
    testState.index = idx;
    var question = QUESTIONS[idx];
    var catIndex = CATEGORIES.findIndex(function(c){ return c.key===question.cat; });
    var category = CATEGORIES[catIndex];
    var answeredValue = testState.answers[question.id];
    var isLast = idx === total-1;

    var overallPct = Math.round((idx/total)*100);

    var segmentsHtml = CATEGORIES.map(function(c){
      var qs = QUESTIONS.filter(function(q){ return q.cat===c.key; });
      var done = qs.filter(function(q){ return testState.answers.hasOwnProperty(q.id); }).length;
      var pct = Math.round((done/qs.length)*100);
      return '<div class="segment' + (c.key===category.key?' current':'') + '"><div class="segment-fill" style="width:' + pct + '%"></div></div>';
    }).join('');

    var likertHtml = LIKERT_LABELS.map(function(lab, i){
      var val = i+1;
      var sel = answeredValue===val ? ' selected' : '';
      return '<button type="button" class="likert-vbtn' + sel + '" data-value="' + val + '">' + lab + '</button>';
    }).join('');

    $('#app').innerHTML =
      '<div class="test-step">' +
        '<div class="test-head"><h1>' + escapeHtml(name) + '님의 리더십 진단</h1></div>' +
        '<div class="overall-bar"><div class="overall-fill" style="width:' + overallPct + '%"></div></div>' +
        '<div class="segments">' + segmentsHtml + '</div>' +
        '<div class="progress-meta">' +
          '<span class="mono-label">STATION ' + (catIndex+1) + ' · ' + category.label + '</span>' +
          '<span class="mono-label">질문 ' + (idx+1) + ' / ' + total + '</span>' +
        '</div>' +
        '<div class="wizard-question">' +
          '<p class="q-text-big">' + escapeHtml(question.text) + '</p>' +
          '<div class="likert-vertical" data-qid="' + question.id + '">' + likertHtml + '</div>' +
        '</div>' +
        '<div class="wizard-nav">' +
          '<button class="btn-outline" data-action="prev-question"' + (idx===0?' disabled':'') + '>이전</button>' +
          '<button class="btn-primary" data-action="next-question"' + (answeredValue===undefined?' disabled':'') + '>' + (isLast?'결과 보기':'다음') + '</button>' +
        '</div>' +
      '</div>';
  }

  async function goNextStep(){
    var total = QUESTIONS.length;
    var question = QUESTIONS[testState.index];
    if(testState.answers[question.id]===undefined){
      toast('답변을 선택해주세요.');
      return;
    }
    if(testState.index >= total-1){
      await submitTest();
      return;
    }
    testState.index += 1;
    renderTestStep(testState.name);
  }
  function goPrevStep(){
    if(testState.index > 0){
      testState.index -= 1;
      renderTestStep(testState.name);
    }
  }

  async function submitTest(){
    var total = QUESTIONS.length;
    var answeredCount = Object.keys(testState.answers).length;
    if(answeredCount < total){
      toast('모든 문항에 답변해주세요. (' + answeredCount + '/' + total + ')');
      return;
    }
    var btn = document.querySelector('[data-action="next-question"]');
    if(btn){ btn.disabled = true; btn.textContent = '저장 중...'; }

    var result = computeResult(testState.answers);
    var info = TYPE_INFO[result.code];
    var data = {
      nickname: testState.name,
      mbti: result.code,
      alias: info.alias,
      group: groupOf(result.code),
      pct: result.pct,
      date: new Date().toISOString()
    };
    var ok = await setMember(testState.name, data);
    if(ok){
      var savedName = testState.name;
      testState = { name:'', index:0, answers:{} };
      go('detail', { name: savedName });
    }else{
      toast('저장에 실패했어요. 다시 시도해주세요.');
      if(btn){ btn.disabled = false; btn.textContent = '결과 보기'; }
    }
  }

      '<section class="card">' +
        '<h2>구성원 결과</h2>' +
        '<p class="hint">닉네임을 누르면 그 사람의 결과로, 별명을 누르면 유형 설명으로 이동합니다.</p>' +
        '<table class="member-table">' +
          '<thead><tr><th>닉네임</th><th>MBTI</th><th>별명</th><th>검사일</th></tr></thead>' +
          '<tbody>' + rowsHtml + '</tbody>' +
        '</table>' +
      '</section>' +
      '<div class="dash-section-label">우리 팀 MBTI 분포</div>' +
      typeDonutHtml +
      '<div class="donut-grid">' + dichotomyDonutsHtml + '</div>';
  }

  /* ============ admin (password-gated) ============ */
  var adminUnlocked = false;

  function renderAdmin(){
    if(!adminUnlocked){
      $('#app').innerHTML =
        '<section class="card admin-gate">' +
          '<h1>관리자 로그인</h1>' +
          '<p class="note">관리자 비밀번호를 입력하세요.</p>' +
          '<input id="admin-password" type="password" placeholder="비밀번호" autocomplete="off" />' +
          '<button class="btn-primary" data-action="admin-login">확인</button>' +
        '</section>';
      var input = $('#admin-password');
      if(input) input.focus();
      return;
    }
    renderAdminPanel();
  }

  async function renderAdminPanel(){
    $('#app').innerHTML = '<p class="loading">불러오는 중...</p>';
    var members = await listMembers();
    members.sort(function(a,b){ return a.nickname.localeCompare(b.nickname); });

    var rowsHtml = members.length===0
      ? '<tr><td colspan="5" class="empty">아직 저장된 결과가 없습니다.</td></tr>'
      : members.map(function(m){
          return '<tr>' +
            '<td>' + escapeHtml(m.nickname) + '</td>' +
            '<td><span class="badge" style="--badge-color:' + GROUP_META[m.group].color + '">' + m.mbti + '</span></td>' +
            '<td>' + m.alias + '</td>' +
            '<td class="mono-cell">' + formatDate(m.date) + '</td>' +
            '<td><button class="btn-danger" data-action="delete-member" data-name="' + escapeHtml(m.nickname) + '">삭제</button></td>' +
          '</tr>';
        }).join('');

    $('#app').innerHTML =
      '<section class="dash-head">' +
        '<h1>관리자</h1>' +
        '<p class="note warn">이 페이지에서는 팀 공유 저장소의 결과를 삭제할 수 있습니다. 삭제한 데이터는 복구할 수 없습니다.</p>' +
      '</section>' +
      '<section class="card">' +
        '<div class="admin-toolbar">' +
          '<span class="mono-label">총 ' + members.length + '명</span>' +
          '<button class="btn-danger" data-action="reset-all"' + (members.length===0?' disabled':'') + '>전체 삭제</button>' +
        '</div>' +
        '<table class="member-table">' +
          '<thead><tr><th>닉네임</th><th>MBTI</th><th>별명</th><th>검사일</th><th></th></tr></thead>' +
          '<tbody>' + rowsHtml + '</tbody>' +
        '</table>' +
      '</section>';
  }

  async function handleResetAll(){
    if(!confirm('정말 전체 결과를 삭제할까요? 되돌릴 수 없습니다.')) return;
    var members = await listMembers();
    for(var i=0;i<members.length;i++){ await deleteMember(members[i].nickname); }
    toast('전체 삭제되었습니다.');
    renderAdminPanel();
  }
  async function handleDeleteMember(name){
    if(!confirm("'" + name + "' 님의 결과를 삭제할까요?")) return;
    await deleteMember(name);
    toast('삭제되었습니다.');
    renderAdminPanel();
  }
  function handleAdminLogin(){
    var input = $('#admin-password');
    var val = input ? input.value : '';
    if(val === ADMIN_PASSWORD){
      adminUnlocked = true;
      renderAdminPanel();
    }else{
      toast('비밀번호가 올바르지 않습니다.');
    }
  }

  /* ============ global delegated events ============ */
  var appEl = document.getElementById('app');
  var autoAdvanceTimer = null;
  function clearAutoAdvance(){
    if(autoAdvanceTimer){ clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  }

  appEl.addEventListener('click', async function(e){
    var likertBtn = e.target.closest('.likert-vbtn');
    if(likertBtn){
      var likertDiv = likertBtn.closest('.likert-vertical');
      var qid = Number(likertDiv.dataset.qid);
      var value = Number(likertBtn.dataset.value);
      testState.answers[qid] = value;

      // Update just the selection highlight + enable the next/submit button
      // directly (no full re-render here) so clicking an option never causes
      // a layout jump.
      likertDiv.querySelectorAll('.likert-vbtn').forEach(function(b){
        b.classList.toggle('selected', b===likertBtn);
      });
      var nextBtnNow = document.querySelector('[data-action="next-question"]');
      if(nextBtnNow) nextBtnNow.disabled = false;

      // Auto-advance to the next question (or submit, on the last one) —
      // same action as clicking "다음"/"결과 보기". A brief pause lets the
      // person see their selection highlighted before the step changes.
      clearAutoAdvance();
      var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var delay = reduceMotion ? 0 : 350;
      autoAdvanceTimer = setTimeout(async function(){
        autoAdvanceTimer = null;
        await goNextStep();
      }, delay);
      return;
    }

    var actionEl = e.target.closest('[data-action]');
    if(!actionEl) return;
    var action = actionEl.dataset.action;

    if(action==='start-test'){
      var input = $('#nickname-input');
      var name = input ? input.value.trim() : '';
      if(!name){ toast('닉네임을 입력해주세요.'); if(input) input.focus(); return; }
      go('test', { name:name });
    } else if(action==='goto-dashboard'){
      go('dashboard');
    } else if(action==='goto-home'){
      go('home');
    } else if(action==='next-question'){
      clearAutoAdvance();
      await goNextStep();
    } else if(action==='prev-question'){
      clearAutoAdvance();
      goPrevStep();
    } else if(action==='retest'){
      go('test', { name: actionEl.dataset.name });
    } else if(action==='refresh-dashboard'){
      renderDashboard();
    } else if(action==='admin-login'){
      handleAdminLogin();
    } else if(action==='reset-all'){
      await handleResetAll();
    } else if(action==='delete-member'){
      await handleDeleteMember(actionEl.dataset.name);
    }
  });

  appEl.addEventListener('keydown', function(e){
    if(e.key!=='Enter') return;
    if(e.target && e.target.id==='nickname-input'){
      var name = e.target.value.trim();
      if(!name){ toast('닉네임을 입력해주세요.'); return; }
      go('test', { name:name });
    } else if(e.target && e.target.id==='admin-password'){
      handleAdminLogin();
    }
  });

  (async function init(){
    backendMode = await detectBackend();
    if(backendMode==='memory'){
      var banner = document.getElementById('fallback-banner');
      if(banner){
        banner.style.display = 'block';
        banner.textContent = '⚠ 공유 저장소에 연결되지 않아 이 브라우저 탭에서만 임시로 동작합니다. 팀원 간 결과 공유가 필요하면 Claude 아티팩트로 열거나, Neon과 연동된 배포본을 사용해주세요.';
      }
    }
    window.addEventListener('hashchange', route);
    route();
  })();
})();
</script>
</body>
</html>
